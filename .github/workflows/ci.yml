name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run backend tests
        run: pnpm --filter backend test

      - name: Run frontend tests
        run: pnpm --filter frontend test

      - name: Run backend coverage
        run: pnpm --filter backend test:coverage

      - name: Run frontend coverage
        run: pnpm --filter frontend test:coverage

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install chromium --with-deps

      - name: Start backend
        run: node backend/src/index.js &

      - name: Start frontend
        run: pnpm --filter frontend dev &

      - name: Wait for servers
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do sleep 1; done'
          timeout 30 bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 1; done'

      - name: Run Playwright E2E tests
        run: cd e2e && pnpm exec playwright test --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
